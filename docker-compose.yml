services:
  backend:
    build: ./backend
    ports:
      - "4567:4567"
    volumes:
      - ./backend:/app
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - POLL_INTERVAL=${POLL_INTERVAL:-300}
      - DAYS_WINDOW=${DAYS_WINDOW:-3}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4567
    depends_on:
      - backend
    restart: unless-stopped
